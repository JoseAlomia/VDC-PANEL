<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VDC — Sistema de Control</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg2: #111113;
    --bg3: #18181b;
    --bg4: #1e1e22;
    --border: #27272a;
    --border2: #3f3f46;
    --text: #fafafa;
    --text2: #a1a1aa;
    --text3: #71717a;
    --accent: #00e5a0;
    --accent2: #00b37d;
    --red: #f87171;
    --yellow: #fbbf24;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --font-mono: 'JetBrains Mono', monospace;
    --font-display: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 52px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 20px; }
  .logo { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }
  .logo span { color: var(--accent); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .last-update { color: var(--text3); font-size: 11px; }
  .btn-refresh {
    background: transparent; border: 1px solid var(--border2);
    color: var(--text2); font-family: var(--font-mono); font-size: 11px;
    padding: 5px 12px; border-radius: 4px; cursor: pointer;
    transition: all .15s;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  /* NAV TABS */
  .nav-tabs {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; gap: 0;
    background: var(--bg);
  }
  .nav-tab {
    padding: 12px 18px; font-family: var(--font-mono); font-size: 12px;
    color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent;
    transition: all .15s; user-select: none; white-space: nowrap;
  }
  .nav-tab:hover { color: var(--text2); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  .main { padding: 24px; max-width: 1600px; margin: 0 auto; }

  /* SECTION */
  .section { display: none; }
  .section.active { display: block; }

  /* KPI GRID */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; padding: 16px 18px;
    transition: border-color .15s;
  }
  .kpi-card:hover { border-color: var(--border2); }
  .kpi-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .kpi-value { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
  .kpi-value.accent { color: var(--accent); }
  .kpi-value.red { color: var(--red); }
  .kpi-value.yellow { color: var(--yellow); }
  .kpi-value.blue { color: var(--blue); }
  .kpi-sub { font-size: 10px; color: var(--text3); margin-top: 6px; }

  /* TABLE */
  .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 24px; }
  .table-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .table-title { font-family: var(--font-display); font-size: 13px; font-weight: 600; color: var(--text); }
  .table-count { font-size: 11px; color: var(--text3); }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 14px; text-align: left; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); font-weight: 500; white-space: nowrap; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--text2); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background: var(--bg3); color: var(--text); }
  tr.selected td { background: var(--bg4); }
  .td-name { color: var(--text); font-weight: 500; }
  .td-mono { font-family: var(--font-mono); }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: 500; white-space: nowrap; }
  .badge::before { content:''; width:5px; height:5px; border-radius:50%; flex-shrink:0; }
  .badge-proceso { background: rgba(96,165,250,.1); color: var(--blue); border: 1px solid rgba(96,165,250,.2); }
  .badge-proceso::before { background: var(--blue); }
  .badge-pendiente { background: rgba(113,113,122,.1); color: var(--text3); border: 1px solid rgba(113,113,122,.2); }
  .badge-pendiente::before { background: var(--text3); }
  .badge-finalizado { background: rgba(0,229,160,.1); color: var(--accent); border: 1px solid rgba(0,229,160,.2); }
  .badge-finalizado::before { background: var(--accent); }
  .crit-alta { color: var(--red); font-weight: 600; }
  .crit-media { color: var(--yellow); }
  .crit-baja { color: var(--accent); }
  .crit-cerrado { color: var(--text3); }

  /* PROGRESS BAR */
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-bar { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; min-width: 60px; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .3s; }
  .progress-fill.red { background: var(--red); }
  .progress-fill.yellow { background: var(--yellow); }
  .progress-pct { font-size: 11px; color: var(--text2); width: 32px; text-align: right; flex-shrink: 0; }

  /* GANTT */
  .gantt-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-bottom: 24px; }
  .gantt-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .gantt-body { overflow-x: auto; }
  .gantt-row { display: flex; border-bottom: 1px solid var(--border); min-height: 44px; }
  .gantt-row:last-child { border-bottom: none; }
  .gantt-row:hover { background: var(--bg3); }
  .gantt-label { width: 240px; flex-shrink: 0; padding: 8px 14px; display: flex; align-items: center; gap: 8px; border-right: 1px solid var(--border); }
  .gantt-label-text { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gantt-level-proj { color: var(--text); font-weight: 600; font-size: 12px; }
  .gantt-level-fase { color: var(--text2); padding-left: 14px; }
  .gantt-level-tarea { color: var(--text3); padding-left: 28px; font-size: 11px; }
  .gantt-chart { flex: 1; position: relative; padding: 6px 8px; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 600px; }
  .gantt-bar-row { display: flex; position: relative; height: 10px; }
  .gantt-bar { position: absolute; height: 10px; border-radius: 2px; min-width: 4px; }
  .gantt-bar-prog { background: rgba(96,165,250,.3); border: 1px solid rgba(96,165,250,.4); }
  .gantt-bar-real { background: rgba(0,229,160,.4); border: 1px solid rgba(0,229,160,.5); }
  .gantt-bar-late { background: rgba(248,113,113,.4); border: 1px solid rgba(248,113,113,.5); }
  .gantt-months { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); }
  .gantt-month-label-cell { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border); padding: 6px 14px; font-size: 10px; color: var(--text3); }
  .gantt-months-scale { flex: 1; display: flex; min-width: 600px; }
  .gantt-month { flex: 1; padding: 6px 4px; font-size: 10px; color: var(--text3); text-align: center; border-right: 1px solid var(--border); white-space: nowrap; overflow: hidden; }

  /* LOADING */
  .loading { padding: 60px; text-align: center; color: var(--text3); }
  .loading-spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .error-box { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2); border-radius: 6px; padding: 16px 18px; color: var(--red); font-size: 12px; margin-bottom: 16px; }

  /* SECTION DIVIDER */
  .section-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content:''; flex: 1; height: 1px; background: var(--border); }

  /* TWO COL */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text3); font-family: var(--font-mono); font-size: 11px; padding: 5px 12px; border-radius: 4px; cursor: pointer; transition: all .15s; }
  .filter-btn:hover { border-color: var(--border2); color: var(--text2); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,.06); }

  /* EMPTY STATE */
  .empty { padding: 32px; text-align: center; color: var(--text3); font-size: 12px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">VDC<span>.</span>SYSTEM</div>
    <div class="status-dot"></div>
  </div>
  <div class="topbar-right">
    <span class="last-update" id="last-update">—</span>
    <button class="btn-refresh" onclick="loadAll()">↺ Actualizar</button>
  </div>
</div>

<div class="nav-tabs">
  <div class="nav-tab active" onclick="showSection('overview')">// overview</div>
  <div class="nav-tab" onclick="showSection('proyectos')">// proyectos</div>
  <div class="nav-tab" onclick="showSection('encargos')">// encargos</div>
  <div class="nav-tab" onclick="showSection('tareas')">// tareas</div>
  <div class="nav-tab" onclick="showSection('criticos')">// críticos</div>
  <div class="nav-tab" onclick="showSection('gantt')">// cronograma</div>
</div>

<div class="main">

  <!-- OVERVIEW -->
  <div class="section active" id="section-overview">
    <div id="kpi-area"><div class="loading"><div class="loading-spinner"></div>Cargando datos...</div></div>
    <div class="section-label">proyectos activos</div>
    <div id="overview-proyectos"></div>
    <div class="section-label">encargos activos</div>
    <div id="overview-encargos"></div>
  </div>

  <!-- PROYECTOS -->
  <div class="section" id="section-proyectos">
    <div id="proyectos-table"></div>
    <div id="fases-detail"></div>
  </div>

  <!-- ENCARGOS -->
  <div class="section" id="section-encargos">
    <div id="encargos-table"></div>
  </div>

  <!-- TAREAS -->
  <div class="section" id="section-tareas">
    <div class="filter-bar" id="tareas-filters">
      <button class="filter-btn active" onclick="filterTareas('all', this)">Todas</button>
      <button class="filter-btn" onclick="filterTareas('Pendiente', this)">Pendientes</button>
      <button class="filter-btn" onclick="filterTareas('En proceso', this)">En proceso</button>
      <button class="filter-btn" onclick="filterTareas('Finalizado', this)">Finalizadas</button>
    </div>
    <div id="tareas-table"></div>
  </div>

  <!-- CRÍTICOS -->
  <div class="section" id="section-criticos">
    <div id="criticos-content"></div>
  </div>

  <!-- GANTT -->
  <div class="section" id="section-gantt">
    <div id="gantt-content"></div>
  </div>

</div>

<script>
// ============================================================
// CONFIGURACIÓN — reemplaza con tus credenciales
// ============================================================
const API_KEY = 'pat9o8OliUjnUXhmK.cb5dc59d421a135d08332aefc194fb8ad060c484703909dc454258f5724d8b45';
const BASE_ID = 'appO1ZnWJsWPWFCVQ';
const TABLES = {
  proyectos: 'tblLRZn52leL103zm',
  fases:     'tbltzBIWnpYisXHOw',
  encargos:  'tbl0WshcvLtWBCjHf',
  tareas:    'tblcyDESggGoNSh3q'
};

// ============================================================
// STATE
// ============================================================
let DATA = { proyectos: [], fases: [], encargos: [], tareas: [] };
let selectedProject = null;
let tareasFilter = 'all';

// ============================================================
// API
// ============================================================
async function fetchTable(tableId, fields) {
  const url = `https://api.airtable.com/v0/${BASE_ID}/${tableId}?pageSize=100`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${API_KEY}` } });
  if (!res.ok) throw new Error(`Error ${res.status}`);
  const data = await res.json();
  let records = data.records;
  if (data.offset) {
    // handle pagination if needed
  }
  return records.map(r => ({ id: r.id, ...r.fields }));
}

async function loadAll() {
  document.getElementById('kpi-area').innerHTML = '<div class="loading"><div class="loading-spinner"></div>Cargando datos...</div>';
  try {
    const [proyectos, fases, encargos, tareas] = await Promise.all([
      fetchTable(TABLES.proyectos),
      fetchTable(TABLES.fases),
      fetchTable(TABLES.encargos),
      fetchTable(TABLES.tareas)
    ]);
    DATA = { proyectos, fases, encargos, tareas };
    const now = new Date();
    document.getElementById('last-update').textContent = `actualizado ${now.toLocaleTimeString('es-PE', {hour:'2-digit',minute:'2-digit'})}`;
    renderAll();
  } catch(e) {
    document.getElementById('kpi-area').innerHTML = `<div class="error-box">Error al conectar con Airtable: ${e.message}<br><small>Verifica tu API token en la configuración del archivo.</small></div>`;
  }
}

// ============================================================
// HELPERS
// ============================================================
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString('es-PE', {day:'2-digit',month:'2-digit',year:'2-digit'});
}

function fmtPct(v) {
  if (v === undefined || v === null || v === '') return '—';
  return Math.round(v) + '%';
}

function statusBadge(s) {
  if (!s) return '<span class="badge badge-pendiente">Pendiente</span>';
  const sl = s.toLowerCase();
  if (sl.includes('proceso')) return `<span class="badge badge-proceso">${s}</span>`;
  if (sl.includes('finaliz')) return `<span class="badge badge-finalizado">${s}</span>`;
  return `<span class="badge badge-pendiente">${s}</span>`;
}

function critBadge(c) {
  if (!c) return '<span class="crit-baja">Baja</span>';
  if (c === 'Alta') return `<span class="crit-alta">▲ Alta</span>`;
  if (c === 'Media') return `<span class="crit-media">◆ Media</span>`;
  if (c === 'Cerrado') return `<span class="crit-cerrado">✓ Cerrado</span>`;
  return `<span class="crit-baja">● Baja</span>`;
}

function progressBar(pct, crit) {
  const p = Math.min(100, Math.max(0, pct || 0));
  const cls = crit === 'Alta' ? 'red' : crit === 'Media' ? 'yellow' : '';
  return `<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill ${cls}" style="width:${p}%"></div></div><span class="progress-pct">${p}%</span></div>`;
}

function devBadge(d) {
  if (d === undefined || d === null || d === '') return '—';
  const v = Math.round(d);
  if (v > 0) return `<span style="color:var(--red)">+${v}%</span>`;
  if (v < 0) return `<span style="color:var(--accent)">${v}%</span>`;
  return '<span style="color:var(--text3)">0%</span>';
}

// ============================================================
// RENDER ALL
// ============================================================
function renderAll() {
  renderKPIs();
  renderOverviewProyectos();
  renderOverviewEncargos();
  renderProyectosTable();
  renderEncargosTable();
  renderTareasTable();
  renderCriticos();
  renderGantt();
}

// ============================================================
// KPIs
// ============================================================
function renderKPIs() {
  const p = DATA.proyectos;
  const e = DATA.encargos;
  const t = DATA.tareas;

  const pActivos = p.filter(x => x['Estado'] !== 'Finalizado').length;
  const pCerrados = p.filter(x => x['Estado'] === 'Finalizado').length;
  const eActivos = e.filter(x => x['Estado'] !== 'Finalizado').length;
  const tPendientes = t.filter(x => x['Estado'] === 'Pendiente').length;
  const tProceso = t.filter(x => x['Estado'] === 'En proceso').length;
  const tFin = t.filter(x => x['Estado'] === 'Finalizado').length;
  const tAlta = t.filter(x => x['Criticidad'] === 'Alta').length;

  document.getElementById('kpi-area').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Proyectos activos</div>
        <div class="kpi-value accent">${pActivos}</div>
        <div class="kpi-sub">${pCerrados} cerrados</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Encargos activos</div>
        <div class="kpi-value blue">${eActivos}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Tareas pendientes</div>
        <div class="kpi-value">${tPendientes}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Tareas en proceso</div>
        <div class="kpi-value blue">${tProceso}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Tareas finalizadas</div>
        <div class="kpi-value accent">${tFin}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Criticidad alta</div>
        <div class="kpi-value red">${tAlta}</div>
        <div class="kpi-sub">tareas críticas</div>
      </div>
    </div>`;
}

// ============================================================
// OVERVIEW PROYECTOS (resumen compacto)
// ============================================================
function renderOverviewProyectos() {
  const activos = DATA.proyectos.filter(x => x['Estado'] !== 'Finalizado');
  if (!activos.length) { document.getElementById('overview-proyectos').innerHTML = '<div class="empty">Sin proyectos activos</div>'; return; }
  const rows = activos.map(p => `
    <tr class="clickable" onclick="selectProjectFromOverview('${p.id}')">
      <td class="td-name">${p['Proyecto'] || '—'}</td>
      <td>${p['Cliente'] || '—'}</td>
      <td>${statusBadge(p['Estado'])}</td>
      <td>${progressBar(p['Avance %'], p['Criticidad'])}</td>
      <td>${fmtDate(p['Fecha Inicio'])}</td>
      <td>${fmtDate(p['Cierre programado'])}</td>
      <td>${devBadge(p['Desviación'])}</td>
      <td>${critBadge(p['Criticidad'])}</td>
    </tr>`).join('');
  document.getElementById('overview-proyectos').innerHTML = `
    <div class="table-wrap" style="margin-bottom:24px">
      <table>
        <thead><tr><th>Proyecto</th><th>Cliente</th><th>Estado</th><th>Avance</th><th>Inicio</th><th>Cierre prog.</th><th>Desviación</th><th>Criticidad</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ============================================================
// OVERVIEW ENCARGOS
// ============================================================
function renderOverviewEncargos() {
  const activos = DATA.encargos.filter(x => x['Estado'] !== 'Finalizado');
  if (!activos.length) { document.getElementById('overview-encargos').innerHTML = '<div class="empty">Sin encargos activos</div>'; return; }
  const rows = activos.map(e => `
    <tr>
      <td class="td-name">${e['Encargos'] || e['Nombre'] || '—'}</td>
      <td>${statusBadge(e['Estado'])}</td>
      <td>${progressBar(e['Avance %'], e['Criticidad'])}</td>
      <td>${fmtDate(e['Fecha Inicio'])}</td>
      <td>${fmtDate(e['Cierre programado'])}</td>
      <td>${devBadge(e['Desviación'])}</td>
      <td>${critBadge(e['Criticidad'])}</td>
    </tr>`).join('');
  document.getElementById('overview-encargos').innerHTML = `
    <div class="table-wrap" style="margin-bottom:24px">
      <table>
        <thead><tr><th>Encargo</th><th>Estado</th><th>Avance</th><th>Inicio</th><th>Cierre prog.</th><th>Desviación</th><th>Criticidad</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ============================================================
// PROYECTOS TABLE
// ============================================================
function renderProyectosTable(filterProj) {
  const list = filterProj ? DATA.proyectos.filter(p => p.id === filterProj) : DATA.proyectos;
  const rows = list.map(p => `
    <tr class="clickable ${selectedProject === p.id ? 'selected' : ''}" onclick="selectProject('${p.id}')">
      <td class="td-name">${p['Proyecto'] || '—'}</td>
      <td>${p['Cliente'] || '—'}</td>
      <td>${p['Tipo'] || 'Implementación'}</td>
      <td>${statusBadge(p['Estado'])}</td>
      <td>${progressBar(p['Avance %'], p['Criticidad'])}</td>
      <td class="td-mono">${fmtDate(p['Fecha Inicio'])}</td>
      <td class="td-mono">${fmtDate(p['Cierre programado'])}</td>

function selectProjectFromOverview(id) {

  showSection('proyectos');

function renderFasesDetail() {
  const container = document.getElementById('fases-detail');
  let fases = DATA.fases;
  let title = 'Fases — todos los proyectos';
  if (selectedProject) {
    const proj = DATA.proyectos.find(p => p.id === selectedProject);
    const projName = proj ? proj['Proyecto'] : '';
    fases = DATA.fases.filter(f => {
      const linked = f['Proyecto'];
      if (!linked) return false;
      if (Array.isArray(linked)) return linked.includes(selectedProject);
      return linked === selectedProject;
    });
    title = `Fases — ${projName}`;
  }
  fases = [...fases].sort((a,b) => (a['Orden']||0) - (b['Orden']||0));
  const rows = fases.map(f => `
    <tr>
      <td style="color:var(--text3);font-size:11px">${f['Orden'] || '—'}</td>
      <td class="td-name">${f['Fase'] || '—'}</td>
      <td>${statusBadge(f['Estado'])}</td>
      <td>${progressBar(f['Avance %'], f['Criticidad'])}</td>
      <td class="td-mono">${fmtDate(f['Fecha Inicio'])}</td>
      <td class="td-mono">${fmtDate(f['Cierre programado'])}</td>
      <td class="td-mono">${f['Cierre real'] || '—'}</td>
      <td>${devBadge(f['Desviación'])}</td>
      <td>${critBadge(f['Criticidad'])}</td>
    </tr>`).join('');
  container.innerHTML = `
    <div class="table-wrap">
      <div class="table-header">
        <span class="table-title">${title}</span>
        <span class="table-count">${fases.length} fases</span>
      </div>
      <table>
        <thead><tr><th>#</th><th>Fase</th><th>Estado</th><th>Avance</th><th>Inicio</th><th>Cierre prog.</th><th>Cierre real</th><th>Desviación</th><th>Criticidad</th></tr></thead>

// ============================================================
function renderCriticos() {
  const critTareas = DATA.tareas.filter(t => t['Criticidad'] === 'Alta');
  const critFases = DATA.fases.filter(f => f['Criticidad'] === 'Alta');
  const critProyectos = DATA.proyectos.filter(p => p['Criticidad'] === 'Alta');

  let html = '';

  if (critProyectos.length) {
    const rows = critProyectos.map(p => `<tr>
      <td class="td-name">${p['Proyecto']||'—'}</td>
      <td>${p['Cliente']||'—'}</td>
      <td>${progressBar(p['Avance %'],'Alta')}</td>
      <td>${devBadge(p['Desviación'])}</td>
      <td class="td-mono">${fmtDate(p['Cierre programado'])}</td>
    </tr>`).join('');
    html += `<div class="section-label">proyectos críticos</div>
    <div class="table-wrap" style="margin-bottom:24px">
      <table><thead><tr><th>Proyecto</th><th>Cliente</th><th>Avance</th><th>Desviación</th><th>Cierre prog.</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }

  if (critFases.length) {
    const rows = critFases.map(f => `<tr>
      <td class="td-name">${f['Fase']||'—'}</td>
      <td>${progressBar(f['Avance %'],'Alta')}</td>
      <td>${devBadge(f['Desviación'])}</td>
      <td class="td-mono">${fmtDate(f['Cierre programado'])}</td>
    </tr>`).join('');
    html += `<div class="section-label">fases críticas</div>
    <div class="table-wrap" style="margin-bottom:24px">
      <table><thead><tr><th>Fase</th><th>Avance</th><th>Desviación</th><th>Cierre prog.</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }

  if (critTareas.length) {
    const rows = critTareas.map(t => {
      const faseId = Array.isArray(t['Fase']) ? t['Fase'][0] : t['Fase'];
      const fase = DATA.fases.find(f => f.id === faseId);
      return `<tr>
        <td class="td-name">${t['Tarea']||t['Name']||'—'}</td>
        <td style="color:var(--text3)">${fase ? fase['Fase'] : '—'}</td>
        <td>${t['Responsable'] ? (Array.isArray(t['Responsable']) ? t['Responsable'].map(r=>r.name||r).join(', ') : (t['Responsable'].name||t['Responsable'])) : '—'}</td>
        <td>${progressBar(t['Avance %'],'Alta')}</td>
        <td>${devBadge(t['Desviación'])}</td>
        <td class="td-mono">${fmtDate(t['Cierre programado'])}</td>
      </tr>`;
    }).join('');
    html += `<div class="section-label">tareas críticas</div>
    <div class="table-wrap">
      <table><thead><tr><th>Tarea</th><th>Fase</th><th>Responsable</th><th>Avance</th><th>Desviación</th><th>Cierre prog.</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }

  if (!html) html = '<div class="empty" style="padding:60px">✓ Sin elementos críticos en este momento</div>';
  document.getElementById('criticos-content').innerHTML = html;
}

// ============================================================
// GANTT
// ============================================================
function renderGantt() {
  const allItems = [];

  // collect proyectos + fases
  DATA.proyectos.forEach(p => {
    allItems.push({ type: 'proyecto', label: p['Proyecto']||'—', inicio: p['Fecha Inicio'], cierreProg: p['Cierre programado'], cierreReal: p['Cierre real'], avance: p['Avance %'] });
    const fases = DATA.fases.filter(f => {
      const linked = f['Proyecto'];
      if (!linked) return false;
      if (Array.isArray(linked)) return linked.includes(p.id);
      return linked === p.id;
    }).sort((a,b) => (a['Orden']||0)-(b['Orden']||0));
    fases.forEach(f => {
      allItems.push({ type: 'fase', label: f['Fase']||'—', inicio: f['Fecha Inicio'], cierreProg: f['Cierre programado'], cierreReal: f['Cierre real'], avance: f['Avance %'] });
    });
  });

  // collect encargos + tareas
  DATA.encargos.forEach(e => {
    allItems.push({ type: 'encargo', label: (e['Encargos']||e['Nombre']||'—'), inicio: e['Fecha Inicio'], cierreProg: e['Cierre programado'], cierreReal: e['Cierre real'], avance: e['Avance %'] });
    const tareas = DATA.tareas.filter(t => {
      const linked = Array.isArray(t['Encargo']) ? t['Encargo'] : [t['Encargo']];
      return linked.includes(e.id);
    });
    tareas.forEach(t => {
      allItems.push({ type: 'tarea', label: t['Tarea']||t['Name']||'—', inicio: t['Fecha Inicio'], cierreProg: t['Cierre programado'], cierreReal: t['Cierre real'], avance: t['Avance %'] });
    });
  });

  // determine date range
  const dates = allItems.flatMap(i => [i.inicio, i.cierreProg, i.cierreReal]).filter(Boolean).map(d => new Date(d));
  if (!dates.length) { document.getElementById('gantt-content').innerHTML = '<div class="empty">Sin datos para el cronograma</div>'; return; }
  const minD = new Date(Math.min(...dates));
  const maxD = new Date(Math.max(...dates));
  minD.setDate(1);
  maxD.setMonth(maxD.getMonth()+1); maxD.setDate(0);
  const totalDays = (maxD - minD) / 86400000;

  function pct(d) {
    if (!d) return null;
    const dt = new Date(d);
    return Math.max(0, Math.min(100, ((dt - minD) / 86400000) / totalDays * 100));
  }

  // build months
  const months = [];
  let cur = new Date(minD);
  while (cur <= maxD) {
    months.push(cur.toLocaleDateString('es-PE', {month:'short', year:'2-digit'}));
    cur.setMonth(cur.getMonth()+1);
  }

  const monthsHTML = months.map(m => `<div class="gantt-month">${m}</div>`).join('');

  const rowsHTML = allItems.map(item => {
    const labelClass = item.type === 'proyecto' || item.type === 'encargo' ? 'gantt-level-proj' :
                       item.type === 'fase' ? 'gantt-level-fase' : 'gantt-level-tarea';
    const l = pct(item.inicio);
    const r = pct(item.cierreProg);
    const rr = pct(item.cierreReal || new Date().toISOString());
    let barsHTML = '';
    if (l !== null && r !== null) {
      barsHTML += `<div class="gantt-bar-row"><div class="gantt-bar gantt-bar-prog" style="left:${l}%;width:${Math.max(0.5,r-l)}%"></div></div>`;
    }
    if (l !== null && rr !== null) {
      const cls = rr > r ? 'gantt-bar-late' : 'gantt-bar-real';
      barsHTML += `<div class="gantt-bar-row"><div class="gantt-bar ${cls}" style="left:${l}%;width:${Math.max(0.5,rr-l)}%"></div></div>`;
    }
    return `<div class="gantt-row">
      <div class="gantt-label"><span class="gantt-label-text ${labelClass}">${item.label}</span></div>
      <div class="gantt-chart">${barsHTML}</div>
    </div>`;
  }).join('');

  document.getElementById('gantt-content').innerHTML = `
    <div class="gantt-wrap">
      <div class="gantt-header">
        <span class="table-title">Cronograma</span>
        <span style="font-size:11px;color:var(--text3)">
          <span style="display:inline-block;width:10px;height:4px;background:rgba(96,165,250,.4);border-radius:1px;margin-right:4px"></span>Programado &nbsp;
          <span style="display:inline-block;width:10px;height:4px;background:rgba(0,229,160,.5);border-radius:1px;margin-right:4px"></span>Real &nbsp;
          <span style="display:inline-block;width:10px;height:4px;background:rgba(248,113,113,.5);border-radius:1px;margin-right:4px"></span>Con retraso
        </span>
      </div>
      <div class="gantt-months">
        <div class="gantt-month-label-cell">elemento</div>
        <div class="gantt-months-scale">${monthsHTML}</div>
      </div>
      <div>${rowsHTML}</div>
    </div>`;
}

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');

}
